name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Browser bundle is current (no drift between src/web and public/js)
        run: |
          npm run build:web
          git diff --exit-code public/js/x402-pay.js
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Evidence bundles verify offline (signatures, digests, commitments)
        run: npm run verify:evidence
      - name: Build
        run: npm run build
      - name: Audit (report-only, non-blocking by design)
        run: npm audit --audit-level=high
        continue-on-error: true

  catalog-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Every catalog offer's signature and asset hash verifies
        run: npx tsx scripts/verify-catalog.ts
